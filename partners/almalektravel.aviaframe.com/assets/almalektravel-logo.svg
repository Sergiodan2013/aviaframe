<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3c8e;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1a6cbe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c8e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3c8e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00c8e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer swoosh ring -->
  <path d="M100,20 A80,80 0 1,1 20,100" fill="none" stroke="url(#swooshGrad)" stroke-width="8" stroke-linecap="round"/>
  <path d="M100,20 A80,80 0 0,0 26,62" fill="none" stroke="url(#swooshGrad)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

  <!-- M letter -->
  <text x="100" y="138" font-family="Arial Black, Arial, sans-serif" font-size="95" font-weight="900"
        text-anchor="middle" fill="url(#mGrad)" letter-spacing="-2">M</text>

  <!-- Airplane at top -->
  <g transform="translate(130,28) rotate(-40)">
    <path d="M0,0 L14,-5 L14,5 Z" fill="#1a3c8e"/>
    <path d="M5,-2 L-4,-8 L-3,-2 Z" fill="#1a6cbe"/>
    <path d="M5,2 L-4,8 L-3,2 Z" fill="#1a6cbe"/>
    <path d="M0,-1 L-6,-1 L-6,1 L0,1 Z" fill="#1a3c8e"/>
  </g>
</svg>
