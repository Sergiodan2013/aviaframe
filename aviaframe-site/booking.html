<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete Booking — AviaFrame</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <style>
    body { margin: 0; padding: 24px; background: #e9effb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: #111827; }
    .wrap { max-width: 860px; margin: 0 auto; }
    .nav { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .nav a { color: #2563eb; font-size: 14px; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    .nav-sep { color: #9ca3af; }
    .brand { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; color: #1e293b; text-decoration: none; }
    .brand svg { width: 24px; height: 24px; }
    .brand-frame { color: #2563eb; font-weight: 400; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 18px; padding: 28px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); margin-bottom: 16px; }
    h2 { margin: 0 0 18px; font-size: 20px; color: #1e293b; }
    .flight-summary { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    .airport { text-align: center; }
    .airport .code { font-size: 32px; font-weight: 800; color: #1e3a5f; }
    .airport .date { font-size: 12px; color: #64748b; margin-top: 2px; }
    .airport .time { font-size: 18px; font-weight: 700; color: #1e293b; }
    .arrow { text-align: center; color: #94a3b8; font-size: 20px; }
    .arrow .airline { font-size: 11px; color: #64748b; display: block; }
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #64748b; margin-bottom: 12px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    input { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #1e293b; background: #fff; outline: none; }
    input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    input.card-input { font-family: 'Courier New', monospace; letter-spacing: 2px; }
    .total-row { display: flex; justify-content: space-between; align-items: center; background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 10px; padding: 14px 16px; margin: 16px 0; }
    .total-label { font-size: 14px; color: #0369a1; font-weight: 600; }
    .total-amount { font-size: 24px; font-weight: 800; color: #1e3a5f; }
    .btn-pay { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background .15s; }
    .btn-pay:hover:not(:disabled) { background: #1d4ed8; }
    .btn-pay:disabled { background: #93c5fd; cursor: not-allowed; }
    .test-card-hint { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #92400e; margin-bottom: 16px; }
    .test-card-hint strong { display: block; margin-bottom: 4px; }
    .loading { font-size: 16px; color: #4b5563; text-align: center; padding: 40px; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #dbeafe; border-top-color: #2563eb; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box { border: 1px solid #fecaca; background: #fff1f2; color: #b91c1c; border-radius: 12px; padding: 14px; font-size: 14px; white-space: pre-wrap; margin-bottom: 16px; }
    .success-box { text-align: center; padding: 20px; }
    .success-icon { font-size: 64px; line-height: 1; }
    .success-title { font-size: 28px; font-weight: 800; color: #1e293b; margin: 12px 0 6px; }
    .success-sub { font-size: 15px; color: #4b5563; margin-bottom: 20px; }
    .order-ref { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 14px; font-size: 18px; font-weight: 700; color: #1e40af; text-align: center; margin: 12px 0; }
    .ticket-note { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #166534; margin-top: 12px; }
    .btn-back { display: inline-block; background: #f1f5f9; color: #475569; font-weight: 600; font-size: 14px; padding: 10px 20px; border-radius: 999px; text-decoration: none; margin-top: 16px; }
    .btn-back:hover { background: #e2e8f0; }
    .step-indicator { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
    .step { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 999px; }
    .step.done { background: #d1fae5; color: #065f46; }
    .step.active { background: #dbeafe; color: #1e40af; }
    .step.pending { background: #f1f5f9; color: #94a3b8; }
    .sep { color: #d1d5db; }
    .method-selector { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin: 16px 0; }
    .method-card { border: 2px solid #e5e7eb; border-radius: 12px; padding: 16px; cursor: pointer; text-align: center; transition: all .15s; background: #fff; }
    .method-card:hover { border-color: #93c5fd; background: #eff6ff; }
    .method-card.selected { border-color: #2563eb; background: #eff6ff; }
    .method-card .method-icon { font-size: 28px; margin-bottom: 6px; }
    .method-card .method-name { font-size: 14px; font-weight: 700; color: #1e293b; }
    .method-card .method-desc { font-size: 11px; color: #64748b; margin-top: 2px; }
    .invoice-box { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 12px; padding: 16px; margin: 16px 0; }
    .invoice-box h3 { margin: 0 0 10px; font-size: 15px; color: #1e293b; }
    .invoice-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; border-bottom: 1px solid #e2e8f0; }
    .invoice-row:last-child { border-bottom: none; }
    .invoice-row .lbl { color: #64748b; }
    .invoice-row .val { font-weight: 600; font-family: monospace; }
    .cash-box { background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px; padding: 20px; margin: 16px 0; text-align: center; }
    .cash-box .cash-icon { font-size: 40px; }
    .cash-box h3 { margin: 8px 0 4px; color: #92400e; }
    .cash-box p { margin: 0; font-size: 13px; color: #b45309; }
    .btn-continue { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s; margin-top: 8px; }
    .btn-continue:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a class="brand" href="/">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 16 L14 8 L16 10 L12 13 L16 13 L22 7 L24 9 L18 17 L22 17 L20 21 L14 19 L11 23 L9 21 L13 17 L8 17 Z" fill="#2563EB"/>
        </svg>
        Avia<span class="brand-frame">Frame</span>
      </a>
      <span class="nav-sep">›</span>
      <a href="/widget-demo.html">Search</a>
      <span class="nav-sep">›</span>
      <span style="color:#374151">Payment</span>
    </div>

    <div id="root">
      <div class="loading">
        <div class="spinner"></div><br/>
        Preparing your booking...
      </div>
    </div>
  </div>

  <script>
    const BACKEND = 'https://peaceful-amazement-production-629f.up.railway.app';
    const AGENCY_KEY = 'ag_eed8b706614bee6a4712686d1026f02b6a862485';
    const MOYASAR_PK = 'pk_test_WXLM8Do2fXap1Ak6Dt3zfKaYyVR';

    const root = document.getElementById('root');

    function fmt(v) {
      if (!v) return '—';
      const d = new Date(v);
      if (isNaN(d)) return v;
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    }
    function fmtTime(v) {
      if (!v) return '—';
      const d = new Date(v);
      if (isNaN(d)) return String(v).slice(0, 5);
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function renderError(msg, backBtn = true) {
      root.innerHTML = `
        <div class="card">
          <div class="error-box">${msg}</div>
          ${backBtn ? '<a class="btn-back" href="/widget-demo.html">← Back to Search</a>' : ''}
        </div>`;
    }

    function renderSuccess(orderNumber, email) {
      const lang = (function(){ try{ return localStorage.getItem('aviaframe-lang')||'en'; }catch(e){ return 'en'; } })();
      const isAr = lang === 'ar';
      const dir = isAr ? 'rtl' : 'ltr';
      root.innerHTML = `
        <div class="card" dir="${dir}">
          <div class="success-box">
            <div class="success-icon">✅</div>
            <div class="success-title">${isAr ? 'تمّت عملية الدفع بنجاح!' : 'Payment Successful!'}</div>
            <div class="success-sub">${isAr ? 'تم تأكيد حجزك وجاري إصدار تذكرتك الإلكترونية.' : 'Your booking is confirmed and your e-ticket is being generated.'}</div>
            <div class="order-ref">${isAr ? 'رقم مرجع الحجز' : 'Booking Reference'}: ${orderNumber}</div>
            <div class="ticket-note">
              📧 ${isAr
                ? `ستُرسَل <strong>تذكرتك الإلكترونية PDF</strong> إلى <strong>${email}</strong> خلال ثوانٍ معدودة. تحقق من صندوق الوارد (ومجلد البريد العشوائي).`
                : `Your <strong>PDF e-ticket</strong> will be sent to <strong>${email}</strong> within a few seconds. Check your inbox (and spam folder).`}
            </div>
            <a class="btn-back" href="/widget-demo.html">${isAr ? 'البحث عن رحلة أخرى ←' : '← Search Another Flight'}</a>
          </div>
        </div>`;
    }

    let _token = null, _offer = null, _pax = null, _sessionData = null;
    let _totalPrice = 0, _basePrice = 0, _taxes = 0, _baggagePrice = 0, _currency = 'SAR';

    (async function () {
      // Read offer & passenger from localStorage
      const offerRaw = localStorage.getItem('selectedOffer');
      const paxRaw = localStorage.getItem('passengerData');
      if (!offerRaw || !paxRaw) {
        renderError('No booking data found. Please return to search and select a flight.');
        return;
      }
      try { _offer = JSON.parse(offerRaw); _pax = JSON.parse(paxRaw); }
      catch { renderError('Failed to read booking data.'); return; }

      const baggagePrices = { none: 0, '20kg': 500, '30kg': 750 };
      _baggagePrice = baggagePrices[_pax.baggage] || 0;
      _basePrice = (_offer.price || {}).total || _offer.total_price || 0;
      _taxes = (_offer.price || {}).taxes || 0;
      _totalPrice = _basePrice + _baggagePrice;
      _currency = (_offer.price || {}).currency || 'SAR';

      // Step 1: Get widget session (includes payment_methods)
      try {
        const sessResp = await fetch(`${BACKEND}/api/widget/session`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agency_key: AGENCY_KEY, origin_host: 'aviaframe.com' })
        });
        if (!sessResp.ok) {
          const errData = await sessResp.json().catch(() => ({}));
          renderError(`Session error: ${errData?.error?.message || sessResp.status}`);
          return;
        }
        _sessionData = await sessResp.json();
        _token = _sessionData.widget_token;
      } catch (e) {
        renderError(`Cannot connect to booking server: ${e.message}`);
        return;
      }

      const paymentMethods = _sessionData?.agency?.settings?.payment_methods || ['online'];

      // Step 2: Show flight summary + payment method selector
      const orig = (_offer.origin || '???').toUpperCase();
      const dest = (_offer.destination || '???').toUpperCase();
      const total = Number(_totalPrice).toLocaleString('en-US');
      const methodsHtml = paymentMethods.length > 1
        ? `<div class="section-label" style="margin-top:20px">How would you like to pay?</div>
           <div class="method-selector" id="method-selector">
             ${paymentMethods.map((m, i) => {
               const icons = { online: '💳', cash: '💵', invoice: '📄' };
               const names = { online: 'Online Payment', cash: 'Cash at Office', invoice: 'Bank Invoice' };
               const descs = { online: 'Pay now by card', cash: 'Visit our office', invoice: 'Bank transfer' };
               return `<div class="method-card${i===0?' selected':''}" data-method="${m}" onclick="selectMethod('${m}')">
                 <div class="method-icon">${icons[m]||'💰'}</div>
                 <div class="method-name">${names[m]||m}</div>
                 <div class="method-desc">${descs[m]||''}</div>
               </div>`;
             }).join('')}
           </div>`
        : '';

      root.innerHTML = `
        <div class="card">
          <div class="step-indicator">
            <span class="step done">✓ Flight Selected</span>
            <span class="sep">›</span>
            <span class="step active">💳 Payment</span>
          </div>
          <h2>Complete Your Booking</h2>
          <div class="flight-summary">
            <div class="airport">
              <div class="code">${orig}</div>
              <div class="date">${fmt(_offer.departure_time)}</div>
              <div class="time">${fmtTime(_offer.departure_time)}</div>
            </div>
            <div class="arrow">✈<span class="airline">${_offer.airline_name||_offer.airline_code||''} ${_offer.flight_number||''}</span></div>
            <div class="airport" style="text-align:center">
              <div class="code">${dest}</div>
              <div class="date">${fmt(_offer.arrival_time)}</div>
              <div class="time">${fmtTime(_offer.arrival_time)}</div>
            </div>
          </div>
          <div class="total-row">
            <span class="total-label">Total</span>
            <span class="total-amount">${total} ${_currency}</span>
          </div>
          ${methodsHtml}
          <button class="btn-continue" onclick="proceedWithMethod()">Continue →</button>
        </div>`;
    })();

    let _selectedMethod = 'online';
    function selectMethod(m) {
      _selectedMethod = m;
      document.querySelectorAll('.method-card').forEach(c => c.classList.toggle('selected', c.dataset.method === m));
    }

    async function proceedWithMethod() {
      const continueBtn = document.querySelector('.btn-continue');
      if (continueBtn) { continueBtn.disabled = true; continueBtn.textContent = 'Creating booking...'; }

      // Create order with selected payment_method
      let orderId = null, orderNumber = null;
      try {
        const orderResp = await fetch(`${BACKEND}/api/widget/orders`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${_token}`,
            'Idempotency-Key': `wgt_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`
          },
          body: JSON.stringify({
            payment_method: _selectedMethod,
            contacts: { email: _pax.email, phone: _pax.phone },
            offer: {
              origin: _offer.origin, destination: _offer.destination,
              departure_time: _offer.departure_time, arrival_time: _offer.arrival_time,
              airline_code: _offer.airline_code, airline_name: _offer.airline_name,
              flight_number: _offer.flight_number, base_price: _basePrice,
              taxes: _taxes, currency: _currency, offer_id: _offer.offer_id
            },
            passengers: [{
              type: 'ADT', first_name: _pax.firstName, last_name: _pax.lastName,
              date_of_birth: _pax.dateOfBirth, gender: _pax.gender === 'male' ? 'M' : 'F',
              document: { type: 'passport', number: _pax.passportNumber, expiry_date: _pax.passportExpiry, issuing_country: _pax.nationality || 'SA' }
            }],
            pricing: { base_price: _basePrice, taxes: _taxes, baggage_price: _baggagePrice, total_price: _totalPrice, currency: _currency },
            metadata: { origin_host: 'aviaframe.com', source: 'widget_demo' }
          })
        });
        if (!orderResp.ok) {
          const errData = await orderResp.json().catch(() => ({}));
          renderError(`Order creation failed: ${errData?.error?.message || orderResp.status}`);
          return;
        }
        const orderData = await orderResp.json();
        orderId = orderData?.order?.id || orderData?.id;
        orderNumber = orderData?.order?.order_number || orderData?.order_number || orderId;
      } catch (e) {
        renderError(`Order error: ${e.message}`);
        return;
      }

      const total = Number(_totalPrice).toLocaleString('en-US');

      if (_selectedMethod === 'cash') {
        renderCashSuccess(orderNumber, _pax.email);
        localStorage.removeItem('selectedOffer'); localStorage.removeItem('passengerData');
        return;
      }

      if (_selectedMethod === 'invoice') {
        const bank = _sessionData?.agency?.settings?.bank_details || {};
        renderInvoiceSuccess(orderNumber, _pax.email, bank, total, _currency);
        localStorage.removeItem('selectedOffer'); localStorage.removeItem('passengerData');
        return;
      }

      // Online payment — show card form
      root.innerHTML = `
        <div class="card">
          <div class="step-indicator">
            <span class="step done">✓ Booking Created</span>
            <span class="sep">›</span>
            <span class="step active">💳 Card Payment</span>
          </div>
          <h2>Pay ${total} ${_currency}</h2>
          <div class="test-card-hint">
            <strong>🧪 TEST MODE — Use test card:</strong>
            <strong>4111 1111 1111 1111</strong> · Exp: <strong>12/26</strong> · CVV: <strong>123</strong>
          </div>
          <div id="pay-error"></div>
          <div class="form-row single"><div><label>Cardholder Name</label><input id="card-name" type="text" placeholder="Name on card" value="Test User" /></div></div>
          <div class="form-row single"><div><label>Card Number</label><input id="card-number" class="card-input" type="text" placeholder="4111 1111 1111 1111" maxlength="19" value="4111 1111 1111 1111" /></div></div>
          <div class="form-row triple">
            <div><label>Month</label><input id="card-month" type="text" placeholder="12" maxlength="2" value="12" /></div>
            <div><label>Year</label><input id="card-year" type="text" placeholder="26" maxlength="4" value="26" /></div>
            <div><label>CVV</label><input id="card-cvc" type="text" placeholder="123" maxlength="4" value="123" /></div>
          </div>
          <div class="total-row"><span class="total-label">Total to pay</span><span class="total-amount">${total} ${_currency}</span></div>
          <button class="btn-pay" id="pay-btn" onclick="submitPayment('${orderId}', '${_pax.email}')">Pay ${total} ${_currency}</button>
        </div>`;
      document.getElementById('card-number').addEventListener('input', function() {
        let v = this.value.replace(/\D/g, '').slice(0, 16);
        this.value = v.replace(/(.{4})/g, '$1 ').trim();
      });
    }

    function renderCashSuccess(orderNumber, email) {
      root.innerHTML = `
        <div class="card">
          <div class="success-box">
            <div class="cash-box">
              <div class="cash-icon">💵</div>
              <h3>Booking Created — Pay at Office</h3>
              <p>Please visit our office to complete payment</p>
            </div>
            <div class="order-ref">Booking Reference: ${orderNumber}</div>
            <div class="ticket-note">📧 Your booking confirmation has been sent to <strong>${email}</strong>.<br>The ticket will be issued after cash payment at our office.</div>
            <a class="btn-back" href="/widget-demo.html">← Search Another Flight</a>
          </div>
        </div>`;
    }

    function renderInvoiceSuccess(orderNumber, email, bank, total, currency) {
      const rows = [
        bank.bank_name ? ['Bank', bank.bank_name] : null,
        bank.iban ? ['IBAN', bank.iban] : null,
        bank.swift_bic ? ['SWIFT/BIC', bank.swift_bic] : null,
        bank.bank_account ? ['Account', bank.bank_account] : null,
        ['Reference', orderNumber],
        ['Amount', `${total} ${currency}`]
      ].filter(Boolean);
      root.innerHTML = `
        <div class="card">
          <div class="success-box">
            <div class="success-icon">📄</div>
            <div class="success-title">Invoice Created</div>
            <div class="success-sub">Please transfer the payment to:</div>
            <div class="invoice-box">
              <h3>Bank Transfer Details</h3>
              ${rows.map(([l,v]) => `<div class="invoice-row"><span class="lbl">${l}</span><span class="val">${v}</span></div>`).join('')}
            </div>
            <div class="order-ref">Order: ${orderNumber}</div>
            <div class="ticket-note">📧 Invoice instructions sent to <strong>${email}</strong>.<br>Ticket will be issued after payment confirmation.</div>
            <a class="btn-back" href="/widget-demo.html">← Search Another Flight</a>
          </div>
        </div>`;
    }

    async function submitPayment(orderId, email) {
      const btn = document.getElementById('pay-btn');
      const errDiv = document.getElementById('pay-error');
      errDiv.innerHTML = '';
      btn.disabled = true;
      btn.textContent = 'Processing payment...';

      const name = document.getElementById('card-name').value.trim();
      const number = document.getElementById('card-number').value.replace(/\s/g, '');
      const month = document.getElementById('card-month').value.trim();
      const year = document.getElementById('card-year').value.trim();
      const cvc = document.getElementById('card-cvc').value.trim();

      if (!name || !number || !month || !year || !cvc) {
        errDiv.innerHTML = '<div class="error-box">Please fill in all card details.</div>';
        btn.disabled = false;
        btn.textContent = 'Retry Payment';
        return;
      }

      try {
        const resp = await fetch(`${BACKEND}/api/payments/initiate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ order_id: orderId, card: { name, number, month, year, cvc } })
        });
        const data = await resp.json();

        if (!resp.ok) {
          errDiv.innerHTML = `<div class="error-box">Payment failed: ${data?.error?.message || resp.status}</div>`;
          btn.disabled = false;
          btn.textContent = 'Retry Payment';
          return;
        }

        if (data.status === 'paid') {
          localStorage.removeItem('selectedOffer');
          localStorage.removeItem('passengerData');
          renderSuccess(data.order_number || orderId, email);
          return;
        }

        if (data.transaction_url) {
          // 3DS redirect — Moyasar will redirect to admin.aviaframe.com after auth
          // Store context so admin can show success
          localStorage.setItem('pendingOrderEmail', email);
          localStorage.setItem('pendingOrderId', orderId);
          window.location.href = data.transaction_url;
          return;
        }

        errDiv.innerHTML = `<div class="error-box">Unexpected payment response: ${JSON.stringify(data)}</div>`;
        btn.disabled = false;
        btn.textContent = 'Retry Payment';
      } catch (e) {
        errDiv.innerHTML = `<div class="error-box">Payment error: ${e.message}</div>`;
        btn.disabled = false;
        btn.textContent = 'Retry Payment';
