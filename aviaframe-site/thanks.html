<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — AviaFrame</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    .thanks-wrap {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .thanks-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(15,23,42,.08);
    }
    .thanks-icon { font-size: 56px; line-height: 1; margin-bottom: 20px; }
    .thanks-title { font-size: 28px; font-weight: 800; color: #0f172a; margin: 0 0 12px; }
    .thanks-text { font-size: 16px; color: #475569; line-height: 1.6; margin: 0 0 32px; }
    .thanks-back {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 28px;
      border-radius: 999px;
      text-decoration: none;
      transition: background .15s;
    }
    .thanks-back:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="site-nav-inner">
      <a class="brand" href="/">
        <svg class="brand-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M6 16 L14 8 L16 10 L12 13 L16 13 L22 7 L24 9 L18 17 L22 17 L20 21 L14 19 L11 23 L9 21 L13 17 L8 17 Z" fill="#2563EB"/>
        </svg>
        <span class="brand-wordmark">Avia<span class="brand-frame">Frame</span></span>
      </a>
    </div>
  </nav>

  <div class="thanks-wrap">
    <div class="thanks-card">
      <div class="thanks-icon">✅</div>
      <div class="thanks-title">Thank you for reaching out!</div>
      <div class="thanks-text">
        Your message has been received. Our manager will get back to you as soon as possible.
        <br><br>
        شكراً لتواصلك معنا. سيتواصل معك مدير المبيعات في أقرب وقت ممكن.
      </div>
      <a class="thanks-back" href="/">← Back to AviaFrame</a>
    </div>
  </div>
</body>
</html>
