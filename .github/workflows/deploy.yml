name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits), '"backend/') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy
        run: railway up --detach --service peaceful-amazement
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: dacc2de7-3d8a-4595-8b26-b0d1d40938d1

  deploy-portal:
    name: Deploy Portal → Netlify
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits), '"portal/') ||
      contains(toJson(github.event.commits), '"widget/') ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal/client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: portal/client
      - name: Build
        run: npm run build
        working-directory: portal/client
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - name: Generate _redirects
        run: node scripts/write-redirects.js
        working-directory: portal/client
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=dist
        working-directory: portal/client
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
